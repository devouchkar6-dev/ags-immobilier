<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche bien — AGS Immobilier</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --navy:#1B2D4F; --navy-deep:#0F1E36; --blue-mid:#2C4A7C; --blue-light:#4A6FA5; --accent:#5B9BD5; --cream:#F0F4F8; --stone:#C8D6E5; --text:#1B2D4F; --text-light:#5A7499; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Jost',sans-serif; background:var(--cream); color:var(--text); }
  nav { background:var(--navy); display:flex; justify-content:space-between; align-items:center; padding:16px 60px; }
  .logo img { height:48px; width:auto; display:block; }
  .nav-back { color:rgba(255,255,255,.7); text-decoration:none; font-size:11px; letter-spacing:2px; text-transform:uppercase; display:flex; align-items:center; gap:8px; transition:color .3s; }
  .nav-back:hover { color:var(--accent); }
  .gallery { display:grid; grid-template-columns:2fr 1fr 1fr; grid-template-rows:1fr 1fr; gap:4px; height:520px; }
  .gallery-main { grid-row:span 2; overflow:hidden; }
  .gallery img { width:100%; height:100%; object-fit:cover; display:block; cursor:pointer; transition:transform .5s; }
  .gallery img:hover { transform:scale(1.03); }
  .gallery-placeholder { background:#d0dce8; display:flex; align-items:center; justify-content:center; font-size:48px; }
  .content { max-width:1100px; margin:0 auto; padding:56px 40px; display:grid; grid-template-columns:1fr 380px; gap:56px; }
  .prop-header { margin-bottom:32px; }
  .prop-badge { display:inline-block; background:var(--blue-mid); color:white; font-size:9px; letter-spacing:2px; text-transform:uppercase; padding:5px 14px; margin-bottom:14px; }
  .prop-title { font-family:'Cormorant Garamond',serif; font-size:38px; font-weight:300; color:var(--navy); line-height:1.15; margin-bottom:8px; }
  .prop-loc { font-size:13px; color:var(--text-light); font-weight:300; margin-bottom:20px; }
  .prop-price-big { font-family:'Cormorant Garamond',serif; font-size:44px; font-weight:300; color:var(--navy); }
  .prop-tags { display:flex; flex-wrap:wrap; gap:10px; margin:28px 0; }
  .tag { background:white; border:1px solid var(--stone); padding:8px 16px; font-size:12px; color:var(--navy); font-weight:300; }
  .section-h { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; color:var(--navy); margin:36px 0 16px; padding-bottom:10px; border-bottom:1px solid var(--stone); }
  .desc { font-size:14px; line-height:1.9; color:var(--text-light); font-weight:300; }
  .equip-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px; }
  .equip-item { background:white; border:1px solid var(--stone); padding:10px 14px; font-size:12px; color:var(--navy); display:flex; align-items:center; gap:8px; }
  .sidebar { position:sticky; top:24px; }
  .contact-card { background:var(--navy); padding:32px; color:white; }
  .contact-card h3 { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; margin-bottom:8px; }
  .contact-card p { font-size:13px; color:rgba(255,255,255,.6); margin-bottom:24px; line-height:1.7; }
  .btn-contact { display:block; background:var(--accent); color:white; text-align:center; padding:15px; font-size:11px; letter-spacing:2px; text-transform:uppercase; text-decoration:none; margin-bottom:12px; }
  .btn-tel { display:block; border:1px solid rgba(255,255,255,.3); color:white; text-align:center; padding:15px; font-size:11px; letter-spacing:2px; text-transform:uppercase; text-decoration:none; }
  .dpe-box { background:white; padding:24px; margin-top:16px; border:1px solid var(--stone); }
  .dpe-box h4 { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-light); margin-bottom:12px; }
  .dpe-letters { display:flex; gap:6px; align-items:flex-end; }
  .dpe-letter { width:32px; font-size:10px; font-weight:500; color:white; display:flex; align-items:center; justify-content:center; border-radius:2px; }
  .loading { text-align:center; padding:120px 40px; font-size:18px; color:var(--text-light); }
  footer { background:var(--navy-deep); color:rgba(255,255,255,.4); text-align:center; padding:24px; font-size:12px; }
  @media(max-width:768px) {
    nav { padding:12px 20px; }
    .gallery { grid-template-columns:1fr; grid-template-rows:240px; height:240px; }
    .gallery > *:not(.gallery-main) { display:none; }
    .gallery-main { grid-row:span 1; }
    .content { grid-template-columns:1fr; padding:24px 16px; gap:24px; }
    .prop-title { font-size:28px; }
    .prop-price-big { font-size:32px; }
    .equip-grid { grid-template-columns:1fr 1fr; }
    .sidebar { position:static; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><img src="images/logo.jpg" alt="AGS Immobilier" onerror="this.style.display='none'"></a>
  <a href="biens.html" class="nav-back">← Retour aux biens</a>
</nav>

<div id="page-content">
  <div class="loading">Chargement de la fiche…</div>
</div>

<footer>
  <p>© 2024 AGS Immobilier — Le Cannet · Tous droits réservés</p>
</footer>

<script>
const GITHUB_RAW = 'https://raw.githubusercontent.com/devouchkar6-dev/ags-immobilier/main/ags-immobilier-v44/biens.json';
const DPE_COLORS = {A:'#00a651',B:'#57b947',C:'#c4d600',D:'#fbaf17',E:'#f26522',F:'#ed1c24',G:'#be1e2d'};
const VILLES = {cannet:'Le Cannet',cannes:'Cannes',mougins:'Mougins',vallauris:'Vallauris',mandelieu:'Mandelieu-la-Napoule',autre:''};

async function chargerFiche() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { afficherErreur('Aucun bien spécifié.'); return; }

  try {
    const res = await fetch(GITHUB_RAW + '?t=' + Date.now());
    if (!res.ok) throw new Error('Impossible de charger les biens');
    const biens = await res.json();
    const bien = biens.find(b => b.id === id);
    if (!bien) { afficherErreur('Ce bien n\'existe pas ou a été retiré.'); return; }
    afficherBien(bien);
  } catch(e) {
    afficherErreur('Erreur lors du chargement : ' + e.message);
  }
}

function afficherErreur(msg) {
  document.getElementById('page-content').innerHTML = `<div class="loading">⚠️ ${msg}<br><br><a href="biens.html" style="color:var(--accent)">← Retour aux biens</a></div>`;
}

function afficherBien(b) {
  const ville = VILLES[b.villeFilter] || b.ville || '';
  const photos = b.photos || (b.mainPhoto ? [b.mainPhoto] : []);

  // Galerie
  const galerie = `
    <div class="gallery">
      <div class="gallery-main">
        ${photos[0] ? `<img src="${photos[0]}" alt="${b.titre}">` : `<div class="gallery-placeholder">🏠</div>`}
      </div>
      ${photos[1] ? `<div><img src="${photos[1]}" alt="${b.titre}"></div>` : `<div class="gallery-placeholder"></div>`}
      ${photos[2] ? `<div><img src="${photos[2]}" alt="${b.titre}"></div>` : `<div class="gallery-placeholder"></div>`}
    </div>`;

  // Tags
  const tags = [];
  if (b.caracteristiques?.surface || b.surface) tags.push('📐 ' + (b.caracteristiques?.surface || b.surface));
  if (b.caracteristiques?.pieces || b.pieces) tags.push('🏠 ' + (b.caracteristiques?.pieces || b.pieces));
  if (b.chambres) tags.push('🛏 ' + b.chambres);
  if (b.etage) tags.push('🏢 ' + b.etage);
  if (b.exposition) tags.push('🌅 ' + b.exposition);
  if (b.annee) tags.push('📅 ' + b.annee);

  // Équipements
  const equips = (b.equipements || []).map(e => `<div class="equip-item">✓ ${e}</div>`).join('');

  // DPE
  const dpeLetters = ['A','B','C','D','E','F','G'];
  const dpeHtml = b.dpe ? `
    <div class="dpe-box">
      <h4>Diagnostic énergétique</h4>
      <div class="dpe-letters">
        ${dpeLetters.map((l,i) => `<div class="dpe-letter" style="height:${20+i*5}px;background:${DPE_COLORS[l]};${b.dpe===l?'outline:3px solid #333;transform:scale(1.1)':''}">${l}</div>`).join('')}
      </div>
    </div>` : '';

  const html = `
    ${galerie}
    <div class="content">
      <div class="left">
        <div class="prop-header">
          ${b.badge ? `<div class="prop-badge">${b.badge}</div>` : ''}
          <h1 class="prop-title">${b.titre}</h1>
          <div class="prop-loc">📍 ${ville}${b.soustitre && b.soustitre !== ville ? ' — ' + b.soustitre : ''}</div>
          <div class="prop-price-big">${b.prix}</div>
          ${b.ref ? `<div style="font-size:11px;color:var(--text-light);margin-top:8px;letter-spacing:1px">Réf. ${b.ref}</div>` : ''}
        </div>
        ${tags.length ? `<div class="prop-tags">${tags.map(t=>`<div class="tag">${t}</div>`).join('')}</div>` : ''}
        ${b.accroche ? `<p style="font-size:15px;color:var(--navy);font-style:italic;margin-bottom:20px;line-height:1.7">${b.accroche}</p>` : ''}
        ${b.description ? `<h2 class="section-h">Description</h2><p class="desc">${b.description.replace(/\n/g,'<br>')}</p>` : ''}
        ${equips ? `<h2 class="section-h">Équipements & prestations</h2><div class="equip-grid">${equips}</div>` : ''}
      </div>
      <div class="sidebar">
        <div class="contact-card">
          <h3>Intéressé par ce bien ?</h3>
          <p>Contactez-nous pour organiser une visite ou obtenir plus d'informations.</p>
          <a href="mailto:agsimmo06@gmail.com?subject=Demande - ${encodeURIComponent(b.titre)}" class="btn-contact">Envoyer un message</a>
          <a href="tel:+33493692828" class="btn-tel">📞 04 93 69 28 28</a>
        </div>
        ${dpeHtml}
      </div>
    </div>`;

  document.title = b.titre + ' | AGS Immobilier';
  document.getElementById('page-content').innerHTML = html;
}

chargerFiche();
</script>
</body>
</html>
