<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche bien — AGS Immobilier</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --navy:#1B2D4F; --navy-deep:#0F1E36; --blue-mid:#2C4A7C; --blue-light:#4A6FA5; --accent:#5B9BD5; --cream:#F0F4F8; --stone:#C8D6E5; --text:#1B2D4F; --text-light:#5A7499; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Jost',sans-serif; background:var(--cream); color:var(--text); }
  nav { background:var(--navy); display:flex; justify-content:space-between; align-items:center; padding:16px 60px; }
  .logo img { height:48px; width:auto; display:block; }
  .nav-back { color:rgba(255,255,255,.7); text-decoration:none; font-size:11px; letter-spacing:2px; text-transform:uppercase; display:flex; align-items:center; gap:8px; transition:color .3s; }
  .nav-back:hover { color:var(--accent); }
  .gallery { display:grid; grid-template-columns:2fr 1fr 1fr; grid-template-rows:1fr 1fr; gap:4px; height:520px; background:#1B2D4F; }
  .gallery-main { grid-row:span 2; overflow:hidden; position:relative; }
  .gallery img { width:100%; height:100%; object-fit:cover; display:block; cursor:pointer; transition:transform .5s; }
  .gallery img:hover { transform:scale(1.03); }
  .gallery-ph { background:#2C4A7C; display:flex; align-items:center; justify-content:center; font-size:40px; opacity:.3; }
  .gallery-count { position:absolute; bottom:12px; right:12px; background:rgba(0,0,0,.6); color:white; font-size:11px; padding:4px 10px; letter-spacing:1px; pointer-events:none; }
  .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:9999; align-items:center; justify-content:center; }
  .lightbox.open { display:flex; }
  .lightbox img { max-width:90vw; max-height:88vh; object-fit:contain; border:2px solid rgba(255,255,255,.1); }
  .lb-close { position:absolute; top:20px; right:28px; color:white; font-size:36px; cursor:pointer; line-height:1; opacity:.7; }
  .lb-close:hover { opacity:1; }
  .lb-prev, .lb-next { position:absolute; top:50%; transform:translateY(-50%); color:white; font-size:44px; cursor:pointer; opacity:.6; padding:10px; user-select:none; }
  .lb-prev:hover, .lb-next:hover { opacity:1; }
  .lb-prev { left:16px; } .lb-next { right:16px; }
  .lb-counter { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,.5); font-size:12px; letter-spacing:2px; }
  .wrap { max-width:1200px; margin:0 auto; padding:56px 40px; display:grid; grid-template-columns:1fr 400px; gap:56px; align-items:start; }
  .prop-badge { display:inline-block; background:var(--blue-mid); color:white; font-size:9px; letter-spacing:2px; text-transform:uppercase; padding:5px 14px; margin-bottom:14px; }
  .prop-title { font-family:'Cormorant Garamond',serif; font-size:38px; font-weight:300; color:var(--navy); line-height:1.15; margin-bottom:8px; }
  .prop-loc { font-size:13px; color:var(--text-light); font-weight:300; margin-bottom:20px; }
  .prop-price { font-family:'Cormorant Garamond',serif; font-size:44px; font-weight:300; color:var(--navy); }
  .prop-ref { font-size:11px; color:var(--text-light); margin-top:6px; letter-spacing:1px; }
  .tags { display:flex; flex-wrap:wrap; gap:10px; margin:28px 0; }
  .tag { background:white; border:1px solid var(--stone); padding:8px 16px; font-size:12px; color:var(--navy); font-weight:300; }
  .section-h { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; color:var(--navy); margin:36px 0 16px; padding-bottom:10px; border-bottom:1px solid var(--stone); }
  .desc { font-size:14px; line-height:1.9; color:var(--text-light); font-weight:300; }
  .equip-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .equip-item { background:white; border:1px solid var(--stone); padding:10px 14px; font-size:12px; color:var(--navy); }
  .sticky-card { position:sticky; top:24px; background:white; box-shadow:0 4px 32px rgba(27,45,79,.1); padding:36px; }
  .sticky-price { font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:300; color:var(--navy); margin-bottom:4px; }
  .sticky-sub { font-size:12px; color:var(--text-light); font-weight:300; margin-bottom:28px; padding-bottom:24px; border-bottom:1px solid var(--stone); }
  .sticky-card .form-group { margin-bottom:14px; }
  .sticky-card label { display:block; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-light); margin-bottom:6px; }
  .sticky-card input, .sticky-card textarea { width:100%; border:1px solid var(--stone); background:var(--cream); padding:11px 14px; font-family:'Jost',sans-serif; font-size:13px; color:var(--navy); font-weight:300; outline:none; transition:border-color .3s; }
  .sticky-card input:focus, .sticky-card textarea:focus { border-color:var(--blue-light); }
  .sticky-card textarea { min-height:80px; resize:vertical; }
  .sticky-submit { width:100%; background:var(--navy); color:white; border:none; padding:14px; font-family:'Jost',sans-serif; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; cursor:pointer; transition:background .3s; margin-top:4px; }
  .sticky-submit:hover { background:var(--blue-light); }
  .sticky-contacts { margin-top:20px; padding-top:20px; border-top:1px solid var(--stone); display:flex; flex-direction:column; gap:8px; }
  .sticky-contact-line { font-size:13px; color:var(--text-light); }
  .sticky-contact-line a { color:var(--navy); text-decoration:none; font-weight:400; }
  .sticky-contact-line a:hover { color:var(--accent); }
  .msg-ok { color:#27ae60; font-size:13px; margin-top:10px; display:none; }
  .msg-err { color:#e74c3c; font-size:13px; margin-top:10px; display:none; }
  .dpe-row { display:flex; gap:24px; margin-top:16px; }
  .dpe-block { flex:1; }
  .dpe-label-h { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-light); margin-bottom:8px; }
  .dpe-letters { display:flex; gap:4px; align-items:flex-end; }
  .dpe-l { width:28px; font-size:10px; font-weight:500; color:white; display:flex; align-items:center; justify-content:center; border-radius:2px; }
  .loading { text-align:center; padding:120px 40px; font-size:16px; color:var(--text-light); }
  footer { background:var(--navy-deep); display:flex; justify-content:space-between; align-items:center; padding:20px 60px; }
  footer span { font-size:12px; color:rgba(255,255,255,.6); }
  footer a { font-size:12px; color:rgba(255,255,255,.6); text-decoration:none; }
  footer a:hover { color:var(--accent); }
  .whatsapp-btn { position:fixed; bottom:28px; left:28px; z-index:999; width:56px; height:56px; background:#25D366; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(37,211,102,.4); text-decoration:none; font-size:26px; }
  /* ── BOTTOM NAV MOBILE ── */
  .mob-bottomnav { display:none; }
  @media(max-width:768px) {
    nav { padding:12px 20px; }
    .gallery { grid-template-columns:1fr; grid-template-rows:260px; height:260px; }
    .gallery > *:not(.gallery-main) { display:none; }
    .gallery-main { grid-row:span 1; }
    .wrap { grid-template-columns:1fr; padding:24px 16px; gap:24px; }
    .prop-title { font-size:28px; } .prop-price { font-size:32px; }
    .equip-grid { grid-template-columns:1fr 1fr; }
    .sticky-card { position:static; }
    footer { padding:16px 20px 80px; flex-direction:column; gap:8px; text-align:center; }
    body { padding-bottom:68px; }
    .mob-bottomnav {
      display:flex !important;
      position:fixed; bottom:0; left:0; right:0;
      height:60px; max-height:60px;
      background:#0F1E36;
      border-top:1px solid rgba(255,255,255,.08);
      z-index:500;
    }
    .mob-bottomnav a {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:8px 2px; text-decoration:none;
      color:rgba(255,255,255,.5); font-size:8px;
      letter-spacing:1px; text-transform:uppercase; gap:4px;
    }
    .mob-bottomnav a:hover { color:#5B9BD5; }
    .mob-bottomnav .nav-icon { font-size:16px; }
  }
</style>

<script>
const APIMO_API  = 'https://ags-immobilier.vercel.app/api/biens';
const GITHUB_RAW = 'https://raw.githubusercontent.com/devouchkar6-dev/ags-immobilier/main/ags-immobilier-v43/biens.json';
const DPE_COLORS = {A:'#00a651',B:'#57b947',C:'#c4d600',D:'#fbaf17',E:'#f26522',F:'#ed1c24',G:'#be1e2d'};

document.addEventListener('DOMContentLoaded', chargerFiche);

async function chargerFiche() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { afficherErreur('Aucun bien spécifié.'); return; }
  let bien = null;
  try {
    const res = await fetch(APIMO_API + '?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      bien = (data.biens || []).find(b => String(b.id) === String(id));
    }
  } catch(e) {}
  if (!bien) {
    try {
      const res = await fetch(GITHUB_RAW + '?t=' + Date.now(), { cache:'no-store' });
      if (res.ok) {
        const biens = await res.json();
        bien = biens.find(b => String(b.id) === String(id));
      }
    } catch(e) {}
  }
  if (!bien) { afficherErreur("Ce bien n'existe plus ou a été retiré."); return; }
  afficherBien(bien);
}

function afficherErreur(msg) {
  document.getElementById('page-content').innerHTML =
    `<div class="loading">⚠️ ${msg}<br><br><a href="biens.html" style="color:var(--accent);font-size:13px;">← Retour aux biens</a></div>`;
}

function dpeBar(lettre) {
  if (!lettre) return '';
  const lettres = ['A','B','C','D','E','F','G'];
  return `<div class="dpe-letters">${lettres.map((l,i) =>
    `<div class="dpe-l" style="height:${18+i*5}px;background:${DPE_COLORS[l]};${lettre===l?'outline:3px solid #333;transform:scale(1.15)':''}">${l}</div>`
  ).join('')}</div>`;
}

function afficherBien(b) {
  const photos = b.photos && b.photos.length ? b.photos : (b.mainPhoto ? [b.mainPhoto] : []);
  const titre  = (b.titre || '').replace(/'/g, "&#39;").replace(/"/g, "&quot;");
  const prix   = b.prix  || '';
  const ville  = (b.ville || '').replace(/'/g, "&#39;");
  const loc    = [b.quartier, ville].filter(Boolean).join(' — ') || ville;
  window._fichPhotos = photos;

  const galHTML = `
    <div class="gallery">
      <div class="gallery-main" style="position:relative">
        ${photos[0]
          ? `<img src="${photos[0]}" alt="${titre}" onclick="ouvrirLB(window._fichPhotos,0)" style="cursor:zoom-in">`
          : `<div class="gallery-ph">🏠</div>`}
        ${photos.length > 1 ? `<div class="gallery-count">📷 ${photos.length} photos</div>` : ''}
      </div>
      ${[1,2].map(i => photos[i]
        ? `<div><img src="${photos[i]}" alt="${titre}" onclick="ouvrirLB(window._fichPhotos,${i})" style="cursor:zoom-in"></div>`
        : `<div class="gallery-ph"></div>`).join('')}
    </div>`;

  const tags = [
    b.surface    && `📐 ${b.surface}`,
    b.pieces     && `🚪 ${b.pieces} pièces`,
    b.chambres   && `🛏 ${b.chambres} chambres`,
    b.etage      && `🏢 Étage ${b.etage}`,
    b.exposition && `🌅 ${b.exposition}`,
    b.annee      && `📅 Construit en ${b.annee}`,
  ].filter(Boolean);

  const equips  = (b.equipements || []).map(e => `<div class="equip-item">✓ ${e}</div>`).join('');
  const dpeHTML = (b.dpe || b.ges) ? `
    <h2 class="section-h">Diagnostic énergétique</h2>
    <div class="dpe-row">
      ${b.dpe ? `<div class="dpe-block"><div class="dpe-label-h">Énergie (DPE)</div>${dpeBar(b.dpe)}</div>` : ''}
      ${b.ges ? `<div class="dpe-block"><div class="dpe-label-h">Émissions (GES)</div>${dpeBar(b.ges)}</div>` : ''}
    </div>` : '';

  const msgDefaut = `Je suis intéressé(e) par ${b.titre || ''}${b.ville ? ' à ' + b.ville : ''} et souhaite organiser une visite.`;

  document.title = (b.titre || '') + ' | AGS Immobilier';
  setTimeout(() => {
    initSimulateur(b.prixBrut || 0);
    const ta = document.getElementById('msg-visite');
    if (ta) ta.value = `Je suis intéressé(e) par ${b.titre || ''} et souhaite organiser une visite.`;
  }, 50);
  document.getElementById('page-content').innerHTML = `
    ${galHTML}
    <div class="wrap">
      <div>
        ${b.badge       ? `<div class="prop-badge">${b.badge}</div>` : ''}
        <h1 class="prop-title">${titre}</h1>
        <div class="prop-loc">📍 ${loc}</div>
        <div class="prop-price">${prix}</div>
        ${b.rente       ? `<div class="prop-ref">Rente mensuelle : ${b.rente}</div>` : ''}
        ${b.ref         ? `<div class="prop-ref">Réf. ${b.ref}</div>` : ''}
        ${tags.length   ? `<div class="tags">${tags.map(t=>`<div class="tag">${t}</div>`).join('')}</div>` : ''}
        ${b.accroche    ? `<p style="font-size:15px;font-style:italic;color:var(--navy);line-height:1.75;margin-bottom:24px">${b.accroche}</p>` : ''}
        ${b.description ? `<h2 class="section-h">Description</h2><p class="desc">${b.description.replace(/\n/g,'<br>')}</p>` : ''}
        ${equips        ? `<h2 class="section-h">Équipements & prestations</h2><div class="equip-grid">${equips}</div>` : ''}

      <!-- ── SIMULATEUR FINANCEMENT ── -->
      <div id="simulateur" style="margin-top:40px;">
        <h2 class="section-h">Simulateur de financement</h2>
        <div style="background:white;border:1px solid var(--stone);padding:28px 32px;">

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;">

            <div>
              <label style="display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;">Prix du bien</label>
              <input id="sim-prix" type="number" readonly
                style="width:100%;border:1px solid var(--stone);background:var(--cream);padding:11px 14px;font-family:'Jost',sans-serif;font-size:14px;color:var(--navy);font-weight:400;outline:none;">
            </div>

            <div>
              <label style="display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;">Apport personnel (€)</label>
              <input id="sim-apport" type="number" value="50000" min="0"
                oninput="calculerFinancement()"
                style="width:100%;border:1px solid var(--stone);background:white;padding:11px 14px;font-family:'Jost',sans-serif;font-size:14px;color:var(--navy);font-weight:400;outline:none;transition:border-color .3s;"
                onfocus="this.style.borderColor='var(--blue-light)'" onblur="this.style.borderColor='var(--stone)'">
            </div>

            <div>
              <label style="display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;">Taux d'intérêt annuel (%)</label>
              <input id="sim-taux" type="number" value="3.5" min="0" max="20" step="0.1"
                oninput="calculerFinancement()"
                style="width:100%;border:1px solid var(--stone);background:white;padding:11px 14px;font-family:'Jost',sans-serif;font-size:14px;color:var(--navy);font-weight:400;outline:none;transition:border-color .3s;"
                onfocus="this.style.borderColor='var(--blue-light)'" onblur="this.style.borderColor='var(--stone)'">
            </div>

            <div>
              <label style="display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;">Durée du prêt (années)</label>
              <input id="sim-duree" type="number" value="20" min="1" max="30"
                oninput="calculerFinancement()"
                style="width:100%;border:1px solid var(--stone);background:white;padding:11px 14px;font-family:'Jost',sans-serif;font-size:14px;color:var(--navy);font-weight:400;outline:none;transition:border-color .3s;"
                onfocus="this.style.borderColor='var(--blue-light)'" onblur="this.style.borderColor='var(--stone)'">
            </div>

            <div>
              <label style="display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;">Frais de notaire (%)</label>
              <input id="sim-notaire" type="number" value="7.5" min="0" max="15" step="0.1"
                oninput="calculerFinancement()"
                style="width:100%;border:1px solid var(--stone);background:white;padding:11px 14px;font-family:'Jost',sans-serif;font-size:14px;color:var(--navy);font-weight:400;outline:none;transition:border-color .3s;"
                onfocus="this.style.borderColor='var(--blue-light)'" onblur="this.style.borderColor='var(--stone)'">
            </div>

            <div>
              <label style="display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;">Frais d'agence (€)</label>
              <input id="sim-agence" type="number" value="0" min="0"
                oninput="calculerFinancement()"
                style="width:100%;border:1px solid var(--stone);background:white;padding:11px 14px;font-family:'Jost',sans-serif;font-size:14px;color:var(--navy);font-weight:400;outline:none;transition:border-color .3s;"
                onfocus="this.style.borderColor='var(--blue-light)'" onblur="this.style.borderColor='var(--stone)'">
            </div>

          </div>

          <!-- Résultats -->
          <div style="background:var(--navy);padding:24px 28px;margin-top:8px;">
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:20px;margin-bottom:20px;">
              <div style="text-align:center;padding:0 12px;border-right:1px solid rgba(255,255,255,.08);">
                <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;">Mensualité estimée</div>
                <div id="res-mensualite" style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:white;">—</div>
              </div>
              <div style="text-align:center;padding:0 12px;border-right:1px solid rgba(255,255,255,.08);">
                <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;">Coût total du crédit</div>
                <div id="res-cout-credit" style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:white;">—</div>
              </div>
              <div style="text-align:center;padding:0 12px;">
                <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;">Coût total acquisition</div>
                <div id="res-cout-total" style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:white;">—</div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0;">
              <div style="text-align:center;padding:0 12px;border-right:1px solid rgba(255,255,255,.08);">
                <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px;">Montant emprunté</div>
                <div id="res-emprunt" style="font-size:16px;font-weight:300;color:rgba(255,255,255,.7);">—</div>
              </div>
              <div style="text-align:center;padding:0 12px;border-right:1px solid rgba(255,255,255,.08);">
                <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px;">Frais de notaire</div>
                <div id="res-notaire" style="font-size:16px;font-weight:300;color:rgba(255,255,255,.7);">—</div>

function envoyerEmailJS(e, form, templateId) {
  e.preventDefault();
  const btn = form.querySelector('button[type=submit]');
  btn.textContent = '⏳ Envoi en cours...';
  btn.disabled = true;
  emailjs.sendForm('service_rktxwry', templateId, form)
    .then(() => { window.location.href = 'merci.html'; })
    .catch(() => {
      document.getElementById('msg-err').style.display = 'block';
      btn.textContent = 'Demander une visite →';
      btn.disabled = false;
    });
}


// ── SIMULATEUR FINANCEMENT ──
function calculerFinancement() {
  const prix    = parseFloat(document.getElementById('sim-prix')?.value) || 0;
  const apport  = parseFloat(document.getElementById('sim-apport')?.value) || 0;
  const taux    = parseFloat(document.getElementById('sim-taux')?.value) || 0;
  const duree   = parseInt(document.getElementById('sim-duree')?.value) || 20;
  const notairePct = parseFloat(document.getElementById('sim-notaire')?.value) || 7.5;
  const agence  = parseFloat(document.getElementById('sim-agence')?.value) || 0;

  if (!prix) return;

  const fraisNotaire = prix * notairePct / 100;
  const emprunt = Math.max(0, prix - apport + agence);
  const coutTotal = prix + fraisNotaire + agence;

  const fmt = v => new Intl.NumberFormat('fr-FR', { style:'currency', currency:'EUR', maximumFractionDigits:0 }).format(v);

  let mensualite = 0, totalInterets = 0, coutCredit = 0;

  if (emprunt > 0 && taux > 0) {
    const tauxMensuel = taux / 100 / 12;
    const n = duree * 12;
    mensualite = emprunt * tauxMensuel * Math.pow(1 + tauxMensuel, n) / (Math.pow(1 + tauxMensuel, n) - 1);
    coutCredit = mensualite * n;
    totalInterets = coutCredit - emprunt;
  } else if (emprunt > 0) {
    mensualite = emprunt / (duree * 12);
    coutCredit = emprunt;
    totalInterets = 0;
  }

  document.getElementById('res-mensualite').textContent  = mensualite ? fmt(mensualite) + '/mois' : '—';
  document.getElementById('res-cout-credit').textContent = coutCredit ? fmt(coutCredit) : '—';
  document.getElementById('res-cout-total').textContent  = fmt(coutTotal + totalInterets);
  document.getElementById('res-emprunt').textContent     = fmt(emprunt);
  document.getElementById('res-notaire').textContent     = fmt(fraisNotaire);
  document.getElementById('res-interets').textContent    = totalInterets ? fmt(totalInterets) : '0 €';
}

function initSimulateur(prixBrut) {
  const el = document.getElementById('sim-prix');
  if (el) { el.value = prixBrut || 0; calculerFinancement(); }
}

let _lbPhotos = [], _lbIdx = 0;
function ouvrirLB(photos, idx) {
  _lbPhotos = photos; _lbIdx = idx;
  document.getElementById('lb-img').src = photos[idx];
  document.getElementById('lb-counter').textContent = (idx+1) + ' / ' + photos.length;
  document.getElementById('lightbox').classList.add('open');
}
function fermerLB() { document.getElementById('lightbox').classList.remove('open'); }
function closeLightbox(e) { if (e.target === document.getElementById('lightbox')) fermerLB(); }
function lbNav(dir) {
  _lbIdx = (_lbIdx + dir + _lbPhotos.length) % _lbPhotos.length;
  document.getElementById('lb-img').src = _lbPhotos[_lbIdx];
  document.getElementById('lb-counter').textContent = (_lbIdx+1) + ' / ' + _lbPhotos.length;
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'Escape')     fermerLB();
});
</script>
